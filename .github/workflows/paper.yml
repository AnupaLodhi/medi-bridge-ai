name: Build JOSS Paper

on:
  push:
    paths:
      - 'paper/**'
      - '.github/workflows/paper.yml'
  pull_request:
    paths:
      - 'paper/**'
      - '.github/workflows/paper.yml'
  workflow_dispatch:

jobs:
  build-paper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build JOSS paper
        uses: openjournals/inara@v1
        with:
          path: paper/paper.md
